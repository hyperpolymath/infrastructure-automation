# Ansible Inventory — Authoritative Infrastructure Map.
#
# This file provides the "Ground Truth" for host identities and role 
# assignments within the automation ecosystem. It is designed to be 
# reflexive: the inventory describes the desired topology, and the 
# playbooks enforce it.

all:
  children:
    # LOCALHOST: Targets the primary development and management node.
    silverblue:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
          # USES: Local connection plugin to avoid SSH overhead 
          # during local management tasks.

    # EXTENSIBILITY: Placeholder for future remote node integration.
    # servers:
    #   hosts:
    #     web01: { ansible_host: 10.0.0.10 }
