# Security Playbook — Hardening and Perimeter Control.
#
# This playbook implements the Layer 2 security controls for the project 
# hosts. It is designed to be run after the base OS foundation is established.
#
# SECURITY DOMAINS:
# 1. **Firewall**: Enforces zone-based network isolation via firewalld.
# 2. **Sudo**: Manages administrative privileges using strict /etc/sudoers.d/ 
#    drop-in policies.

---

- name: "Security — Hardening Layer"
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: "Gather minimal facts"
      # OPTIMIZATION: Only gathers what is needed for security logic 
      # (distribution and service manager) to reduce convergence time.
      ansible.builtin.setup:
        gather_subset: ["!all", "!min", "distribution", "service_mgr"]

  roles:
    - role: firewall
      tags: [security, firewall]

    - role: sudo_config
      tags: [security, sudo]
