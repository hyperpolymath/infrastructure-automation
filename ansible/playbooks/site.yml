# Site Playbook — Master Infrastructure Orchestration.
#
# This file is the authoritative blueprint for the entire project 
# infrastructure. It uses an "Architecture as Code" approach where 
//! the logical layers of the system are explicitly imported in 
//! dependency order.
#
# DEPENDENCY HIERARCHY:
# 1. **Base** (L1): Foundational OS state (Packages, Users, Networking).
# 2. **Security** (L2): Hardening layer (Firewalls, SSH policies).
# 3. **Observability** (L3): Monitoring and log aggregation.
# 4. **Workloads** (L4): Podman container services.
# 5. **Development** (L5): High-level toolchains and envs.

---

# CONVERGENCE: Targets all hosts defined in the inventory.
- name: "Infrastructure Automation — Full Convergence"
  hosts: all
  gather_facts: false
  tasks:
    - name: "Announce convergence start"
      ansible.builtin.debug:
        msg: "Beginning convergence on {{ inventory_hostname }}"
      tags: [always]

# --- LAYER IMPORTS ---
- import_playbook: base.yml
  tags: [base]

- import_playbook: security.yml
  tags: [security]

- import_playbook: containers.yml
  tags: [containers]
