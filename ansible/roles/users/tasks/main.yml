# tasks/main.yml — User Identity and SSH Management.
#
# This role manages the population of system users and their 
# cryptographic credentials. it ensures that access is strictly 
# controlled and adheres to the project's security baseline.

---

- name: Create or manage user accounts
  # IDENTITY: Provisions system accounts with defined UIDs and home paths.
  # create_home: true ensures the skeletal directory structure is present.
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default(users_default_shell) }}"
    home: "{{ item.home | default(users_home_base + '/' + item.name) }}"
    state: "{{ item.state | default('present') }}"
    create_home: true
  loop: "{{ managed_users }}"
  become: true

- name: Deploy SSH authorized_keys for each user
  # ACCESS CONTROL: Injects public keys into the user's authorized_keys file.
  # uses `subelements` to handle multiple keys per user record.
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ managed_users | subelements('ssh_keys', skip_missing=True) }}"
  become: true

- name: Set correct permissions on authorized_keys files
  # HARDENING: Enforces 0600 permissions on private key stores 
  # to satisfy SSH daemon security requirements.
  ansible.builtin.file:
    path: "{{ item.home | default(users_home_base + '/' + item.name) }}/.ssh/authorized_keys"
    mode: "{{ users_authorized_keys_mode }}" # Default: 0600
  loop: "{{ managed_users }}"
  become: true
