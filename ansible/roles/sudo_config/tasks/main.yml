# tasks/main.yml — Sudo Access Control (L2 Hardening).
#
# This role manages administrative privileges on the host. It utilizes 
# the `/etc/sudoers.d/` directory to deploy granular, non-destructive 
# access policies.

---

- name: Configure wheel group passwordless sudo
  # WHEEL: Manages the standard admin group. 
  # validate: Uses `visudo` to ensure the generated file is syntactically 
  # correct before it is written to the filesystem.
  ansible.builtin.copy:
    content: |
      # Managed by Ansible - infrastructure-automation
      %wheel ALL=(ALL) NOPASSWD: ALL
    dest: /etc/sudoers.d/10-wheel
    mode: "0440"
    validate: "visudo -cf %s"
  become: true

- name: Deploy custom sudoers drop-in rules
  # RULES: Deploys project-specific sudo permissions for restricted accounts.
  ansible.builtin.template:
    src: sudoers_rule.j2
    dest: "/etc/sudoers.d/50-{{ item.name }}"
    validate: "visudo -cf %s"
  loop: "{{ sudo_custom_rules }}"
  become: true

- name: Remove unmanaged custom sudoers rules
  # HYGIENE: Wipes any '50-*' files that are not defined in the current 
  # Ansible inventory to prevent stale privilege accumulation.
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _existing_sudoers_rules.files }}"
  when: item.path | basename not in _expected_sudoers_files
  become: true
