# tasks/main.yml — Podman Workload Management (L4).
#
# This role manages the lifecycle of containerized applications. 
# It prioritizes "Rootless" operation to minimize the system attack surface.

---

- name: Enable podman socket for rootless containers
  # SOCKET: Starts the user-level Podman socket, enabling 
  # Docker-compatible API access without requiring root.
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started
    scope: user
  become: false
  when: podman_rootless | bool

- name: Manage podman containers
  # ORCHESTRATION: Declarative state enforcement for container instances.
  # Maps the `podman_containers` variable directly to running workloads.
  containers.podman.podman_container:
    name: "{{ item.name }}"
    image: "{{ item.image }}"
    state: "{{ item.state | default('started') }}"
    ports: "{{ item.ports | default(omit) }}"
    volumes: "{{ item.volumes | default(omit) }}"
    restart_policy: "{{ item.restart_policy | default('always') }}"
  loop: "{{ podman_containers }}"
  when: podman_containers | length > 0

- name: Prune unused container images
  # HYGIENE: Removes orphaned images to conserve disk space 
  # on immutable hosts.
  containers.podman.podman_prune:
    image: true
  when: podman_cleanup | bool
