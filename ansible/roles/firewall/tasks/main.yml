# tasks/main.yml — Firewall Hardening (L2).
#
# This role configures the network perimeter for the host. It ensures 
# that only authorized services and ports are exposed, adhering 
# to the Principle of Least Privilege.

---

- name: Ensure firewalld service is running and enabled
  # SERVICE: Guarantees that the firewall daemon is active and 
  # persists across reboots.
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  become: true

- name: Allow services through firewall
  # PERMISSIONS: Iteratively enables specific services (e.g. ssh, http).
  # immediate: true ensures the rules are applied without a restart.
  ansible.posix.firewalld:
    service: "{{ item }}"
    zone: "{{ firewall_default_zone }}"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ firewall_allowed_services }}"
  become: true
  notify: Reload firewalld

- name: Allow ports through firewall
  # PORTS: Handles custom numeric ports not defined in standard service names.
  ansible.posix.firewalld:
    port: "{{ item }}"
    state: enabled
  loop: "{{ firewall_allowed_ports }}"
  when: firewall_allowed_ports | length > 0
  become: true
  notify: Reload firewalld
