# handlers/main.yml — Firewall State Handlers.
#
# This file defines the reactive tasks triggered by firewall 
# configuration changes. It ensures that rules are atomically 
# applied to the running kernel.

---

- name: Reload firewalld
  # RELOAD: Atomically flushes and re-applies all permanent rules 
  # to the active nftables/iptables chains.
  ansible.builtin.service:
    name: firewalld
    state: reloaded
  become: true
