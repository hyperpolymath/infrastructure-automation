# tasks/main.yml — Static File Management (L1).
#
# This role ensures that system-wide configuration files and banner 
# messages are correctly deployed. It handles the population of 
# environment variables for the automation layer.

---

- name: Deploy /etc/motd with banner message
  # BANNER: Updates the 'Message of the Day' displayed on login. 
  # Used for system identification and provenance tracking.
  ansible.builtin.copy:
    content: "{{ motd_message }}"
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Deploy /etc/profile.d/infrastructure.sh
  # ENVIRONMENT: Injects global variables into the system shell.
  # Uses a loop over `infrastructure_env_vars` to generate 
  # authoritative export statements.
  ansible.builtin.copy:
    content: |
      # Managed by Ansible - infrastructure-automation
      {% for key, value in infrastructure_env_vars.items() %}
      export {{ key }}="{{ value }}"
      {% endfor %}
    dest: /etc/profile.d/infrastructure.sh
    mode: "0755"
  become: true
