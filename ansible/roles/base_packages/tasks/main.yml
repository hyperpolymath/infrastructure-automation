# tasks/main.yml — Base Package Orchestration.
#
# This role ensures that foundational system utilities are present. 
# It implements a "Smart Dispatch" strategy that adapts to the 
# underlying OS immutability.

---

- name: Detect if host is Silverblue/Atomic (immutable OS)
  # DETECTION: Checks for the existence of the OSTree boot marker.
  ansible.builtin.stat:
    path: /run/ostree-booted
  register: _ostree_booted

- name: Install base packages via rpm-ostree (Silverblue/Atomic)
  # IMMUTABLE BRANCH: Uses rpm-ostree for atomic, transactional 
  # package layering. Note the use of --allow-inactive to handle 
  # pending deployments.
  ansible.builtin.command:
    cmd: "rpm-ostree install --idempotent --allow-inactive {{ item }}"
  loop: "{{ base_packages }}"
  when: _ostree_booted.stat.exists | bool
  become: true

- name: Install base packages via dnf (mutable Fedora)
  # MUTABLE BRANCH: Standard DNF package management for 
  # traditional workstation/server installations.
  ansible.builtin.dnf:
    name: "{{ base_packages }}"
    state: present
  when: not (_ostree_booted.stat.exists | bool)
  become: true

- name: Record installed packages as host fact (reflexive pattern)
  # AUDIT: Updates the system's own knowledge of its configuration state.
  ansible.builtin.set_fact:
    base_packages_installed:
      timestamp: "{{ now(utc=true).isoformat() }}"
    cacheable: true
