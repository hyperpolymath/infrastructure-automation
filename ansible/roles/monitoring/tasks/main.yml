# tasks/main.yml — Reflexive System Monitoring (L3).
#
# This role implements the observability layer for the infrastructure. 
# It configures the system to monitor its own health and resource 
# consumption, providing an auditable trail of operational performance.

---

- name: Install monitoring packages (Silverblue/Atomic)
  # IMMUTABLE BRANCH: Layers standard observability tools (htop, iotop, collectd).
  ansible.builtin.command:
    cmd: "rpm-ostree install --idempotent --allow-inactive {{ item }}"
  loop: "{{ monitoring_packages }}"
  when: _ostree_booted_mon.stat.exists | bool
  become: true

- name: Deploy reflexive system stats logging script
  # AUDIT SCRIPT: A lightweight bash utility that captures CPU load, 
  # memory pressure, and disk utilization from /proc and core utils.
  ansible.builtin.copy:
    dest: /usr/local/bin/log-system-stats.sh
    mode: "0755"
    content: |
      #!/bin/bash
      LOGFILE="/var/log/infrastructure/system-stats.log"
      {
        echo "--- $(date --iso-8601=seconds) ---"
        echo "LOAD: $(cat /proc/loadavg)"
        free -h | head -3
      } >> "${LOGFILE}"

- name: Deploy systemd timer for reflexive stats logging
  # AUTOMATION: Schedules the audit script to run every 15 minutes.
  # This ensures consistent telemetry even without external monitoring agents.
  ansible.builtin.copy:
    dest: /etc/systemd/system/infra-stats.timer
    content: |
      [Unit]
      Description=Run infrastructure stats logger every 15 minutes
      [Timer]
      OnUnitActiveSec=15min
  become: true
