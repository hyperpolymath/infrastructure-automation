# tasks/main.yml — Networking and Identity (L1).
#
# This role configures the host's networking baseline. It ensures 
# stable name resolution and enforces the authoritative system hostname.

---

- name: Manage /etc/hosts entries
  # LOCAL RESOLUTION: Idempotently adds IP-to-Name mappings. 
  # backup: true ensures a rollback path is created before modifying 
  # the system file.
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^{{ item.ip | regex_escape() }}\\s+"
    line: "{{ item.ip }}    {{ item.names | join(' ') }}"
    state: present
    backup: true
  loop: "{{ hosts_entries }}"
  when: hosts_entries | length > 0

- name: Deploy /etc/resolv.conf from template
  # NAMESERVERS: Overwrites standard resolution configuration with 
  # the project's preferred DNS topology (e.g. pointing to DNS64).
  ansible.builtin.template:
    src: resolv.conf.j2
    dest: /etc/resolv.conf
    mode: "0644"
  when: manage_resolv_conf | bool

- name: Set system hostname
  # IDENTITY: Enforces the machine's alphanumeric identifier.
  ansible.builtin.hostname:
    name: "{{ hostname }}"
  when: hostname is defined
