# tasks/main.yml — Fedora Silverblue / Atomic Desktop Management.
#
# This role manages the specialized lifecycle of immutable Fedora systems. 
# It prioritizes atomic updates via rpm-ostree and containerized 
# development environments via Toolbox.

---

- name: Layer packages via rpm-ostree
  # IMMUTABLE UPDATES: Performs transactional package layering. 
  # --idempotent: Only updates if changes are necessary.
  # --allow-inactive: Queues the update for the next reboot if a 
  #   deployment is currently in progress.
  ansible.builtin.command:
    cmd: "rpm-ostree install --idempotent --allow-inactive {{ silverblue_layered_packages | join(' ') }}"
  when:
    - silverblue_immutable | bool
    - silverblue_layered_packages | length > 0

- name: Install Flatpak applications
  # APPLICATION LAYER: Deploys desktop apps from Flathub.
  ansible.builtin.command:
    cmd: "flatpak install --noninteractive --assumeyes flathub {{ item }}"
  loop: "{{ silverblue_flatpaks }}"
  when: silverblue_flatpaks | length > 0

- name: Create default toolbox if it does not exist
  # ISOLATION: Provisions a Fedora Toolbox container for development.
  # Enables mutable 'dnf install' workflows within an immutable host.
  ansible.builtin.command:
    cmd: toolbox create --assumeyes
  when:
    - silverblue_toolbox_packages | length > 0
    - "'fedora-toolbox' not in silverblue_toolbox_list.stdout"

- name: Gather current rpm-ostree deployment status (reflexive)
  # AUDIT: Extracts the machine-readable (JSON) status of the OS layers.
  ansible.builtin.command:
    cmd: rpm-ostree status --json
  register: silverblue_ostree_status_raw
  changed_when: false
