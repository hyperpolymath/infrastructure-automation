# Ansible Configuration — Infrastructure Automation Kernel.
#
# This file defines the operational defaults for the Ansible-based 
# configuration management layer. It is optimized for managing 
# local and remote containerized project silos.

[defaults]
# INVENTORY: Path to the authoritative host definition file.
inventory = inventory/hosts.yml

# EXTENSIONS: Location of custom roles and reporter plugins.
roles_path = roles
callback_plugins = plugins/callback

# REPORTING: Uses the custom 'reflexive_reporter' to ensure that 
# every infrastructure change is logged and audited.
stdout_callback = default
callbacks_enabled = reflexive_reporter

# PERFORMANCE: Optimizations for high-speed local management.
forks = 10
pipelining = True
gathering = smart

# LOGGING: The system records its own configuration actions for provenance.
log_path = /tmp/ansible-infrastructure.log

[privilege_escalation]
# SECURITY: Default to using 'sudo' for tasks requiring elevated permissions.
become = True
become_method = sudo
become_user = root

[ssh_connection]
# NETWORKING: Reuses SSH connections to reduce latency during large playbooks.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
